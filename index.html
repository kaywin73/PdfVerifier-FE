<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Signature Verifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>PDF Verifier</h1>
    </header>

    <div class="main-container">
        <!-- Main Panel: PDF Viewer -->
        <main class="pdf-viewer-container">
            <div id="statusBarContainer"></div>
            
            <div id="dropzoneContainer" class="dropzone-container">
                <div id="dropzone" class="dropzone">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                    </svg>
                    <h3>Upload Signed PDF</h3>
                    <p>Drag and drop your file here, or click to browse</p>
                    <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                    <p style="margin-top: 1rem; font-size: 0.75rem;">100% Secure. Processed locally in your browser.</p>
                </div>
            </div>

            <iframe id="pdfPreview" class="hidden" title="PDF Preview"></iframe>
        </main>

        <!-- Signature Details Slider (Drawer) -->
        <div id="signatureDrawer" class="pdf-drawer">
            <div class="drawer-header">
                <h2>Signature Details</h2>
                <button id="closeDrawer" class="close-btn">&times;</button>
            </div>
            <div id="signaturePanelContainer" class="drawer-content">
                <!-- Detailed panel content will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel">
        <h3>Debug JSON Input</h3>
        <p>Paste sample JSON here to test the Signature Panel UI without Wasm</p>
        <textarea id="debugJsonInput"
            placeholder='{"document": { "fileName": "contract_2026_signed.pdf", ... } }'></textarea>
        <button id="debugJsonBtn">Render Signature UI</button>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
